version: "3.9"

services:
  backend:
    container_name: nexora_backend
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      uvicorn src.server:app
      --host 0.0.0.0
      --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    container_name: nexora_worker
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      celery -A src.services.celery:celery_app
      worker
      --loglevel=info
    env_file:
      - .env.docker
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    container_name: nexora_redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped